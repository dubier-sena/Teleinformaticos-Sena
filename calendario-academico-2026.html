const fmtD=d=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${dd}`;};

const getHorarioSortValue=record=>{
  const label=String(record?.horario||'');
  const match=label.match(/(\d{1,2}):(\d{2})(am|pm)/i);
  if(!match)return 9999;
  let hour=Number(match[1])%12;
  if(match[3].toLowerCase()==='pm')hour+=12;
  return hour*60+Number(match[2]);
};
const compareRecordsBySchedule=(a,b)=>{
  const dateCmp=String(a.fecha||'').localeCompare(String(b.fecha||''));
  if(dateCmp)return dateCmp;
  const timeCmp=getHorarioSortValue(a)-getHorarioSortValue(b);
  if(timeCmp)return timeCmp;
  const rowCmp=(Number(a.sourceRow)||0)-(Number(b.sourceRow)||0);
  if(rowCmp)return rowCmp;
  return String(a.id||'').localeCompare(String(b.id||''));
};

// ════════════════════════════════════════════════════════════════
// DATASET BASE DEL CALENDARIO
// Los registros fuente se expanden por franja horaria para que cada bloque
// quede como una clase independiente dentro del calendario editable.
// ════════════════════════════════════════════════════════════════
function splitHorarioSlots(horario){
  if(!horario||horario==='—')return ['—'];
  return String(horario)
    .split(/\s*(?:\/|;|\r?\n)+\s*/)
    .map(slot=>slot.trim())
    .filter(Boolean);
}

function expandRecords(records){
  const expanded=[];
  records.forEach((record)=>{
    const baseRecord={...record,baseId:record.id,slotIndex:1,slotCount:1};
    if(record.tipo!=='CLASE'){
      expanded.push(baseRecord);
      return;
    }

    const slots=splitHorarioSlots(record.horario);
    if(slots.length<=1){
      expanded.push({...baseRecord,horario:slots[0]||record.horario});
      return;
    }

    slots.forEach((slot,index)=>{
      expanded.push({
        ...baseRecord,
        id:`${record.id}|franja${index+1}`,
        horario:slot,
        slotIndex:index+1,
        slotCount:slots.length
      });
    });
  });
  return expanded;
}

function buildInitialState(seed,records){
  const initial={};
  records.forEach((record)=>{
    const seedState=seed[record.id]||seed[record.baseId||record.id];
    if(seedState){
      initial[record.id]=JSON.parse(JSON.stringify(seedState));
    }
  });
  return initial;
}

const SOURCE_RECORDS=(Array.isArray(window.CALENDAR_2026_RECORDS)?window.CALENDAR_2026_RECORDS:[])
  .map((record,index)=>({...record,sourceRow:index+4}));
const RECORDS=expandRecords(SOURCE_RECORDS);
const INITIAL_STATE=buildInitialState(window.CALENDAR_2026_INITIAL_STATE||{},RECORDS);
const RECORD_IDS=new Set(RECORDS.map(record=>record.id));
const RECORDS_BY_BASE_ID=RECORDS.reduce((acc,record)=>{
  const baseId=record.baseId||record.id;
  (acc[baseId]=acc[baseId]||[]).push(record);
  return acc;
},{});

function normalizeStateEntries(source){
  const normalized={};
  Object.entries(source||{}).forEach(([key,value])=>{
    if(RECORD_IDS.has(key)){
      normalized[key]=value;
      return;
    }
    const matches=RECORDS_BY_BASE_ID[key];
    if(matches){
      matches.forEach((record)=>{
        normalized[record.id]=JSON.parse(JSON.stringify(value));
      });
    }
  });
  return normalized;
}

const getG=r=>estados[r.id]?.grado??r.grado;

function getGradeOptionsForRecord(record){
  const baseOptions=GRADE_OPTIONS[record.colegio]||[];
  return Array.from(new Set([...baseOptions,getG(record),record.grado].filter(grade=>grade&&grade!=='—')));
}

function applyGradeToRecord(record,grade){
  const next={...(estados[record.id]||{})};
  if(!grade||grade===record.grado){
    delete next.grado;
  } else {
    next.grado=grade;
  }
  estados[record.id]=next;
}

const cloneInitialState=()=>JSON.parse(JSON.stringify(INITIAL_STATE));

function buildSyncStatePayload(){
  const payload={};
  RECORDS.forEach((record)=>{
    const current={...(estados[record.id]||{})};
    current.sourceRow=record.sourceRow;
    if(record.tipo==='CLASE'){
      current.grado=getG(record);
    }
    payload[record.id]=current;
  });
  return payload;
}

function buildCalendarSnapshot(){
  return {
    calendarId:FIREBASE_CALENDAR_DOC,
    version:2,
    updatedAt:new Date().toISOString(),
    updatedBy:getCalendarActor(),
    state:buildSyncStatePayload()
  };
}

function normalizeCalendarSnapshot(raw){
  if(!raw||typeof raw!=='object')return null;
  const source=(raw.state&&typeof raw.state==='object')?raw.state:raw;
  return {
    calendarId:raw.calendarId||FIREBASE_CALENDAR_DOC,
    version:Number(raw.version)||1,
    updatedAt:typeof raw.updatedAt==='string'?raw.updatedAt:'',
    updatedBy:typeof raw.updatedBy==='string'?raw.updatedBy:'',
    state:normalizeStateEntries(source)
  };
}

function persistLocalSnapshot(snapshot){
  const normalized=normalizeCalendarSnapshot(snapshot);
  if(!normalized)return;
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(normalized));}catch(e){}
}

function readLocalSnapshot(){
  try{
    const current=localStorage.getItem(STORAGE_KEY);
    if(current){
      return normalizeCalendarSnapshot(JSON.parse(current));
    }
  }catch(e){}

  try{
    const legacy=localStorage.getItem(LEGACY_STORAGE_KEY);
    if(legacy){
      return normalizeCalendarSnapshot({
        calendarId:FIREBASE_CALENDAR_DOC,
        version:1,
        updatedAt:'',
        updatedBy:'',
        state:JSON.parse(legacy)
      });
    }
  }catch(e){}

  return null;
}

function applyCalendarSnapshot(snapshot){
  estados=cloneInitialState();
  const normalized=normalizeCalendarSnapshot(snapshot);
  if(normalized){
    Object.assign(estados,normalized.state);
  }
}

function snapshotTime(snapshot){
  const value=Date.parse(snapshot?.updatedAt||'');
  return Number.isFinite(value)?value:0;
}

function formatSnapshotMeta(snapshot){
  const parts=[];
  if(snapshot?.updatedBy)parts.push(`Responsable: ${snapshot.updatedBy}`);
  if(snapshot?.updatedAt){
    try{
      parts.push(`Fecha: ${new Date(snapshot.updatedAt).toLocaleString('es-CO')}`);
    }catch(error){}
  }
  return parts.join('\n');
}

function getAdminCalendarSession(){
  if(!window.portalAuth||typeof window.portalAuth.getCurrentSession!=='function')return null;
  const session=window.portalAuth.getCurrentSession();
  if(!session||session.role!=='admin'||!session.token)return null;
  return session;
}

async function calendarApiRequest(method,{snapshot=null,refresh=false,force=false,timeoutMs=20000}={}){
  if(!window.portalAuth||typeof window.portalAuth.getSharedStoreStatus!=='function')return null;
  if(!/^https?:$/i.test(window.location.protocol))return null;

  let sharedStatus=null;
  try{
    sharedStatus=await window.portalAuth.getSharedStoreStatus(force);
  }catch(error){
    return null;
  }

  if(!sharedStatus?.available)return null;
  const session=getAdminCalendarSession();
  if(!session)return null;

  const url=new URL('/api/admin/calendar',window.location.origin);
  url.searchParams.set('calendarId',FIREBASE_CALENDAR_DOC);
  url.searchParams.set('_',String(Date.now()));
  if(refresh){
    url.searchParams.set('refresh','1');
  }

  const headers={
    Accept:'application/json',
    'X-Portal-Token':session.token
  };
  const requestOptions={
    method,
    headers,
    cache:'no-store'
  };

  if(method==='POST'){
    headers['Content-Type']='application/json';
    requestOptions.body=JSON.stringify({
      calendarId:FIREBASE_CALENDAR_DOC,
      snapshot
    });
  }

  let controller=null;
  let timerId=null;
  if(typeof AbortController!=='undefined'){
    controller=new AbortController();
    requestOptions.signal=controller.signal;
    timerId=window.setTimeout(()=>controller.abort(),timeoutMs);
  }

  try{
    const response=await fetch(url.toString(),requestOptions);
    const text=await response.text();
    let payload={};
    try{
      payload=text?JSON.parse(text):{};
    }catch(error){
      payload={ ok:response.ok, message:text||'Respuesta no valida del almacenamiento compartido.' };
    }
    payload.status=response.status;
    if(typeof payload.ok!=='boolean'){
      payload.ok=response.ok;
    }
    return payload;
  }catch(error){
    return {
      ok:false,
      message:error?.message||'No fue posible conectar con el almacenamiento compartido.'
    };
  }finally{
    if(timerId){
      window.clearTimeout(timerId);
    }
  }
}

async function loadFirebaseSnapshot(force){
  lastRemoteCalendarSource='';
  lastRemoteCalendarMessage='';

  const sharedResult=await calendarApiRequest('GET',{ refresh:force, force, timeoutMs:22000 });
  if(sharedResult&&sharedResult.ok){
    const sharedSnapshot=normalizeCalendarSnapshot(sharedResult.snapshot);
    lastRemoteCalendarSource=sharedResult.source||'network';
    lastRemoteCalendarMessage=sharedResult.message||'';
    if(sharedSnapshot){
      firebaseSyncAvailable=true;
      setSyncStatus(sharedResult.source==='firebase'?'Firebase conectado':'Almacenamiento compartido activo','online');
      return sharedSnapshot;
    }
    if(sharedResult.source==='network'){
      firebaseSyncAvailable=true;
      setSyncStatus('Almacenamiento compartido activo','online');
      return null;
    }
  }

  if(!window._firebaseDb||typeof window._firebaseDb.cloudGetCalendar!=='function'){
    setSyncStatus('Firebase no disponible','offline');
    return null;
  }

  if(force&&typeof window._firebaseDb.resetCache==='function'){
    window._firebaseDb.resetCache();
  }

  let ok=false;
  if(typeof window._firebaseDb.checkAvailability==='function'){
    try{
      ok=await window._firebaseDb.checkAvailability();
    }catch(error){
      ok=false;
    }
  }

  try{
    const snapshot=normalizeCalendarSnapshot(await window._firebaseDb.cloudGetCalendar(FIREBASE_CALENDAR_DOC));
    if(snapshot){
      firebaseSyncAvailable=true;
      lastRemoteCalendarSource='firebase';
      setSyncStatus('Firebase conectado','online');
      return snapshot;
    }

    if(ok){
      firebaseSyncAvailable=true;
      lastRemoteCalendarSource='firebase';
      setSyncStatus('Firebase conectado','online');
      return null;
    }
  }catch(error){
  }

  firebaseSyncAvailable=false;
  setSyncStatus('Firebase no disponible','offline');
  return null;
}

async function loadData(){
  const localSnapshot=readLocalSnapshot();
  applyCalendarSnapshot(localSnapshot);
  setSaveChip(localSnapshot?'💾 Cambios locales cargados':'Base inicial cargada',false);

  const remoteSnapshot=await loadFirebaseSnapshot(false);
  if(remoteSnapshot){
    if(!localSnapshot||snapshotTime(remoteSnapshot)>=snapshotTime(localSnapshot)){
      applyCalendarSnapshot(remoteSnapshot);
      persistLocalSnapshot(remoteSnapshot);
      setSaveChip(
        lastRemoteCalendarSource==='network'
          ? (remoteSnapshot.updatedAt?'☁ Calendario cargado desde la red':'Base cargada desde la red')
          : (remoteSnapshot.updatedAt?'☁ Calendario cargado desde Firebase':'Base cargada desde Firebase'),
        false
      );
    }else{
      pendingCalendarSnapshot=buildCalendarSnapshot();
      scheduleFirebaseSync();
      setSaveChip('💾 Cambios locales conservados',false);
    }
    return;
  }

  if(localSnapshot){
    setSaveChip('💾 Cambios locales cargados',false);
  }
}

function saveData(){
  pendingCalendarSnapshot=buildCalendarSnapshot();
  persistLocalSnapshot(pendingCalendarSnapshot);
  setSaveChip('💾 Guardado local',true);
  scheduleFirebaseSync();
  setTimeout(()=>{
    if(pendingCalendarSnapshot){
      setSaveChip('💾 Guardado local',false);
    }
  },600);
}
function exportarDatos(){
  const json=JSON.stringify(buildCalendarSnapshot(),null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='calendario_2026_cambios_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
function importarDatos(ev){
  const f=ev.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const imported=normalizeCalendarSnapshot(JSON.parse(e.target.result));
      if(!imported)throw new Error('Sin datos');
      applyCalendarSnapshot(imported);
      pendingCalendarSnapshot=buildCalendarSnapshot();
      persistLocalSnapshot(pendingCalendarSnapshot);
      saveData();render();
      alert('✅ Calendario importado correctamente.');
    }catch(err){alert('❌ Archivo no válido.');}
  };
  reader.readAsText(f);
  ev.target.value='';
}
function resetCalendar(){
  if(!confirm('Se restaurara el calendario a la base inicial y se reemplazara tambien en Firebase.'))return;
  try{
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(LEGACY_STORAGE_KEY);
  }catch(e){}
  estados=cloneInitialState();
  pendingCalendarSnapshot=buildCalendarSnapshot();
  persistLocalSnapshot(pendingCalendarSnapshot);
  setSaveChip('Base inicial restaurada',false);
  syncFirebaseState(true);
  render();
}

async function loadLatestFromFirebase(){
  const localSnapshot=readLocalSnapshot();
  const shouldReplace=confirm(
    localSnapshot
      ? 'Se cargara la ultima version disponible en Firebase y se reemplazaran los cambios locales actuales. Deseas continuar?'
      : 'Se cargara la ultima version disponible en Firebase. Deseas continuar?'
  );
  if(!shouldReplace)return false;

  clearTimeout(syncTimer);
  setSyncStatus('Buscando ultima version de Firebase...','syncing');
  setSaveChip('☁ Cargando desde Firebase…',true);

  const remoteSnapshot=await loadFirebaseSnapshot(true);
  if(!remoteSnapshot){
    setSaveChip(localSnapshot?'💾 Cambios locales conservados':'Base inicial cargada',false);
    if(lastRemoteCalendarSource==='network'){
      alert('No se encontro una copia nueva en Firebase en este momento. El almacenamiento compartido ya conserva la ultima version disponible.');
    }else{
      alert('No se encontro una version remota disponible en Firebase para cargar en este momento.');
    }
    return false;
  }

  pendingCalendarSnapshot=null;
  firebaseSyncAvailable=true;
  applyCalendarSnapshot(remoteSnapshot);
  persistLocalSnapshot(remoteSnapshot);
  render();
  setSyncStatus(lastRemoteCalendarSource==='network'?'Almacenamiento compartido activo':'Firebase conectado','online');
  setSaveChip(lastRemoteCalendarSource==='network'?'☁ Ultima version compartida cargada':'☁ Ultima version de Firebase cargada',false);

  const meta=formatSnapshotMeta(remoteSnapshot);
  if(lastRemoteCalendarSource==='network'){
    alert(meta ? `Se cargo la ultima version disponible en el almacenamiento compartido.\n\n${meta}` : 'Se cargo la ultima version disponible en el almacenamiento compartido.');
  }else{
    alert(meta ? `Se cargo la ultima version disponible en Firebase.\n\n${meta}` : 'Se cargo la ultima version disponible en Firebase.');
  }
  return true;
}

function setSyncStatus(text,mode){
  const chip=document.getElementById('sync-chip');
  if(!chip)return;
  chip.textContent=text;
  chip.className=`sync-chip ${mode}`;
}

function configureDeploymentMode(){
  const syncChip=document.getElementById('sync-chip');
  const syncButton=document.getElementById('firebase-sync-button');
  const loadButton=document.getElementById('firebase-load-button');
  const resetButton=document.getElementById('calendar-reset-button');

  if(syncChip)syncChip.style.display='';
  if(resetButton){
    resetButton.textContent='Restaurar';
  }
  if(syncButton){
    syncButton.style.display='';
  }
  if(loadButton){
    loadButton.style.display='';
  }
}

function scheduleFirebaseSync(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>{syncFirebaseState(false);},700);
}

async function syncFirebaseState(force){
  const snapshot=pendingCalendarSnapshot||buildCalendarSnapshot();
  pendingCalendarSnapshot=snapshot;

  const sharedResult=await calendarApiRequest('POST',{ snapshot, force, timeoutMs:25000 });
  if(sharedResult&&sharedResult.ok){
    const normalizedSnapshot=normalizeCalendarSnapshot(sharedResult.snapshot||snapshot)||snapshot;
    pendingCalendarSnapshot=null;
    firebaseSyncAvailable=true;
    persistLocalSnapshot(normalizedSnapshot);
    setSyncStatus(sharedResult.remoteSaved===false?'Almacenamiento compartido activo':'Firebase conectado','online');
    setSaveChip(sharedResult.remoteSaved===false?'✅ Guardado compartido':'✅ Guardado en Firebase',false);
    return true;
  }

  if(!window._firebaseDb||typeof window._firebaseDb.cloudSaveCalendar!=='function'){
    setSyncStatus('Firebase no disponible','offline');
    setSaveChip('💾 Guardado local',false);
    if(force){
      alert('Firebase no esta disponible en esta version del portal. Tus cambios si quedaron guardados en este navegador.');
    }
    return false;
  }

  let ok=false;
  if(typeof window._firebaseDb.checkAvailability==='function'){
    try{
      ok=await window._firebaseDb.checkAvailability();
    }catch(error){
      ok=false;
    }
  }

  setSyncStatus(ok?'Sincronizando Firebase...':'Verificando Firebase...','syncing');
  setSaveChip('☁ Guardando en Firebase…',true);
  let syncError='No fue posible guardar en Firebase.';

  try{
    const saved=await window._firebaseDb.cloudSaveCalendar(FIREBASE_CALENDAR_DOC,snapshot);
    if(!saved){
      throw new Error('Firebase no confirmo el guardado.');
    }

    firebaseSyncAvailable=true;
    pendingCalendarSnapshot=null;
    setSyncStatus('Firebase conectado','online');
    setSaveChip('✅ Guardado en Firebase',false);
    return true;
  }catch(error){
    syncError=error?.message||syncError;
    firebaseSyncAvailable=false;
    setSyncStatus('Firebase no disponible','offline');
    setSaveChip('💾 Guardado local',false);
    if(force){
      alert(`No fue posible guardar en Firebase.\n\n${syncError}\n\nTus cambios si quedaron guardados en este navegador.`);
    }
    return false;
  }
}

function redrawRegTables(main,tipoSel,estSel,inp){
  main.querySelectorAll('.reg-sec').forEach(e=>e.remove());
  const q=(inp.value||'').toLowerCase(),tipo=tipoSel.value,estado=estSel.value;
  const pass=r=>{
    if(tipo&&r.tipo!==tipo)return false;
    if(estado&&getE(r)!==estado)return false;
    if(q&&!(r.colegio+' '+getG(r)+' '+r.fecha+' '+r.dia+' '+r.mes).toLowerCase().includes(q))return false;
    return true;
  };
  const hab=RECORDS.filter(r=>!r.finde&&pass(r)).sort(compareRecordsBySchedule);
  const fin=RECORDS.filter(r=> r.finde&&pass(r)).sort(compareRecordsBySchedule);
  const cnt=main.querySelector('#reg-cnt');
  if(cnt)cnt.textContent=(hab.length+fin.length)+' registros';
  buildRegSection(main,'📅 Días Hábiles',hab,false);
  if(fin.length)buildRegSection(main,'🗓️ Fines de Semana',fin,true);
}

  const stateText=String(getE(record)||'').toLowerCase();

// FIX: determine cell state for a day based on ALL classes
// Returns: 'all-sp' | 'all-desp' | 'all-ko' | 'some-ko' | 'imp' | 'rec' | 'act' | null
function dayCellState(clases){
  if(!clases.length)return null;
  const states=clases.map(r=>getE(r));
  if(states.every(e=>e==='Sin programación'))return 'all-sp';
  if(states.every(e=>e==='Cancelada')&&clases.every(r=>isDesplazamientoReason(r)))return 'all-desp';
  if(states.every(e=>e==='Cancelada'))return 'all-ko';
  if(states.some(e=>e==='Cancelada'))return 'some-ko';
  if(states.every(e=>e==='Impartida'))return 'imp';
  if(states.some(e=>e==='Impartida'))return 'some-imp';
  if(states.some(e=>e==='Recuperada'))return 'rec';
  return 'act';
}

    const dh=el('div','cal-dh',d.slice(0,3).toUpperCase());
    dh.style.background=i<5?'#1e40af':i===5?'#374151':'#111827';
    grid.appendChild(dh);
  });
  // Blanks
  for(let i=0;i<startWd;i++)grid.appendChild(el('div','cal-blank'));

  for(let day=1;day<=nDays;day++){
    const s=`2026-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const d=parseD(s),wd=iwd(d);
    const isWe=wd>=5,isFuera=d>CONTRACT_END;
    const isFest=FESTIVOS.has(s),isRec=RECESOS.has(s),isSp=!!SPECIAL[s];
    const PRIord={'CLASE':0,'SENA':1,'SÁBADO':2,'DOMINGO':3};
    const recs=(dm[day]||[]).sort((a,b)=>{
      const typeCmp=(PRIord[a.tipo]??9)-(PRIord[b.tipo]??9);
      if(typeCmp)return typeCmp;
      return compareRecordsBySchedule(a,b);
    });
    const clases=recs.filter(r=>r.tipo==='CLASE');
    const senaR=recs.find(r=>r.tipo==='SENA');
    const weR=recs.find(r=>r.finde);
    const weE=weR?getE(weR):'No aplica';

    const cell=el('div','cal-cell');
    cell.appendChild(el('div','cal-day',String(day)));

    let bg='#fff',brd='#E5E7EB',brdW=1;

    if(isFuera){
      bg='#F3F4F6';brd='#D1D5DB';
      cell.appendChild(el('div','cal-note','<span style="color:#9ca3af;font-style:italic;font-size:9px;">Fuera contrato</span>'));
    } else if(isRec){
      bg='#FFF7ED';brd='#FDBA74';
      cell.appendChild(el('div','cal-note','<span style="color:#c2410c">☀️ Receso</span>'));
    } else if(isFest){
      bg='#FFFDE7';brd='#FCD34D';
      cell.appendChild(el('div','cal-note','<span style="color:#b45309">🎉 Festivo</span>'));
    } else if(isSp){
      const sp=SPECIAL[s];bg=sp.bg;brd=sp.c;brdW=2;
      const n=el('div','cal-note',`<span style="color:${sp.c};cursor:pointer">${sp.label}</span>`);
      n.onclick=()=>openModal(recs[0]);cell.appendChild(n);
    } else if(isWe){
      if(weE==='SEDE SENA'){bg='#EEF2FF';brd='#6366f1';brdW=2;}
      else if(weE==='DESPLAZAMIENTO'){bg='#FFFBEB';brd='#f59e0b';brdW=2;}
      else{bg='#F9FAFB';brd='#E5E7EB';}
      const n=el('div','cal-note');
      if(weE==='SEDE SENA')n.innerHTML='<span style="font-size:11px;font-weight:900;color:#3730a3;cursor:pointer">🏢 SEDE SENA</span>';
      else if(weE==='DESPLAZAMIENTO')n.innerHTML='<span style="font-size:10px;font-weight:900;color:#78350f;cursor:pointer">🚗 DESPLAZ. A OTANCHE</span>';
      else n.innerHTML='<span style="font-size:10px;color:#9ca3af">No laboral</span>';
      if(weR){n.style.cursor='pointer';n.onclick=()=>openModal(weR);}
      cell.appendChild(n);
    } else if(clases.length){
      const cs=dayCellState(clases);

      // ── FIX: Si TODAS las clases del día son "Sin programación" → mostrar 🏢 SEDE SENA ──
      if(cs==='all-sp'){
        bg='#EEF2FF';brd='#6366f1';brdW=2;
        const n=el('div','');
        n.style.cssText='margin-top:6px;cursor:pointer;';
        n.innerHTML='<div style="font-size:13px;font-weight:900;color:#3730a3">🏢 SEDE SENA</div><div style="font-size:9px;color:#6366f1;margin-top:2px">Sin programación</div>';
        n.onclick=()=>openModal(clases[0]);
        cell.appendChild(n);
      } else if(cs==='all-desp'){
        bg='#FFFBEB';brd='#f59e0b';brdW=2;
        const n=el('div','');
        n.style.cssText='margin-top:6px;cursor:pointer;';
        n.innerHTML='<div style="font-size:13px;font-weight:900;color:#78350f">🚗 Desplazamiento</div><div style="font-size:9px;color:#b45309;margin-top:2px">Clases canceladas por desplazamiento</div>';
        n.onclick=()=>openModal(clases[0]);
        cell.appendChild(n);
      } else {
        const gc=GC[clases[0].colegio+'-'+getG(clases[0])];
        if(gc){bg=gc.lt;brd=gc.dk;brdW=2;}
        if(cs==='all-ko'){bg='#FEF2F2';brd='#ef4444';brdW=2;}

        clases.forEach(r=>{
          const e=getE(r),grade=getG(r),gc2=GC[r.colegio+'-'+grade]||{dk:'#374151',lt:'#F3F4F6'};
          const act=getAct(r);
          const sh=r.colegio.includes('Kennedy')?'JFK':'SB';
          const isDesplazamiento=isDesplazamientoReason(r);
          // ── FIX: si solo ESTA clase es Sin programación → mostrar 🏢 en su píldora ──
          const emap={
            Activa:           {bg:gc2.lt,    tc:gc2.dk,  str:false},
            Impartida:        {bg:'#BBF7D0',  tc:'#14532d',str:false},
            Cancelada:        isDesplazamiento?{bg:'#FFFBEB',tc:'#78350f',str:false}:{bg:'#FECACA',tc:'#7f1d1d',str:true},
            'Sin programación':{bg:'#EEF2FF', tc:'#3730a3',str:false},
            Recuperada:       {bg:'#FED7AA',  tc:'#7c2d12',str:false},
          };
          const es=emap[e]||{bg:gc2.lt,tc:gc2.dk,str:false};
          const pill=el('div','class-pill');
          pill.style.cssText=`background:${es.bg};border-left-color:${es.tc};margin-top:3px;`;
          const lbl=e==='Sin programación'?'🏢 '+sh+' '+grade:
                    e==='Impartida'?'✔ '+sh+' '+grade:
                    e==='Cancelada'&&isDesplazamiento?'🚗 '+sh+' '+grade:
                    sh+' '+grade;
          pill.innerHTML=`<div class="cp-lbl" style="color:${es.tc};${es.str?'text-decoration:line-through':''}">${escapeHtml(lbl)}</div>
            <div class="cp-hr">${escapeHtml(r.horario||'')}</div>`;
          if(act?.nombre){
            pill.innerHTML+=`<div class="cp-act">📋 ${escapeHtml(act.nombre.slice(0,18))}${act.nombre.length>18?'…':''}</div>`;
            if(act?.fecha)pill.innerHTML+=`<div class="act-badge">🗓 ${escapeHtml(fmtActFecha(act.fecha))}</div>`;
          }
          pill.onclick=()=>openModal(r);
          cell.appendChild(pill);
        });
      }
      cell.style.cssText+=`background:${bg};border:${brdW}px solid ${brd};${brdW>1?'box-shadow:0 2px 8px rgba(0,0,0,.08);':''}`;
    } else if(senaR){
      bg='#EEF2FF';brd='#6366f1';brdW=2;
      const n=el('div','cal-note','<span style="font-size:11px;font-weight:900;color:#3730a3;cursor:pointer">🏢 SEDE SENA</span>');
      n.onclick=()=>openModal(senaR);cell.appendChild(n);
    }

    if(!clases.length||dayCellState(clases)==='all-sp'||dayCellState(clases)==='all-desp'||dayCellState(clases)==='all-ko'){
      cell.style.background=bg;
      cell.style.border=`${brdW}px solid ${brd}`;
      if(brdW>1)cell.style.boxShadow='0 2px 8px rgba(0,0,0,.08)';
    }
    grid.appendChild(cell);
  }

  wrap.appendChild(grid);
  return wrap;
}

// ════════════════════════════════════════════════════════════════
// SINGLE MONTH VIEW
// ════════════════════════════════════════════════════════════════
function renderCal(){
  const main=document.getElementById('main');main.innerHTML='';
  const card=el('div','card');
  const hrow=el('div');hrow.style.cssText='display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap;';
  const ht=el('div');ht.style.cssText='font-size:18px;font-weight:900;color:var(--navy);';
  ht.textContent='📅 '+MF[curMonth]+' 2026';
  hrow.appendChild(ht);card.appendChild(hrow);
  card.appendChild(buildLegend());
  card.appendChild(buildCalMonth(curMonth));
  card.appendChild(el('p','','<span style="font-size:11px;color:#9ca3af;display:block;text-align:center;margin-top:10px;">💡 Haga clic en cualquier celda para cambiar su estado</span>'));
  main.appendChild(card);
}

// ════════════════════════════════════════════════════════════════
// ALL MONTHS VIEW
// ════════════════════════════════════════════════════════════════
function renderAll(){
  const main=document.getElementById('main');main.innerHTML='';
  const hcard=el('div','card');
  hcard.style.marginBottom='10px';
  hcard.innerHTML='<div class="card-title" style="margin-bottom:4px;">📆 Vista completa del contrato 2026</div><div style="font-size:12px;color:var(--gray)">Todos los meses de un vistazo · Haga clic en cualquier día para editar</div>';
  main.appendChild(hcard);

  MONTHS.forEach(m=>{
    const card=el('div','card');
    card.style.marginBottom='16px';
    const title=el('div','cal-month-title','📅 '+MF[m]+' 2026');
    card.appendChild(title);
    card.appendChild(buildCalMonth(m));
    main.appendChild(card);
  });
}

// ════════════════════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════════════════════
function refreshModalBtns(opts){
  const eo=document.getElementById('est-opts');eo.innerHTML='';
  opts.forEach(opt=>{
    const ss=SS[opt]||SS['Activa'];
    const active=opt===modalCurEstado;
    const btn=document.createElement('button');
    btn.type='button';btn.className='est-btn';
    btn.innerHTML=`${ss.em} ${opt}`;
    btn.style.color=active?'#fff':ss.tc;
    btn.style.background=active?ss.bc:'#F9FAFB';
    btn.style.borderColor=active?ss.bc:'#E5E7EB';
    btn.addEventListener('click',function(ev){ev.stopPropagation();modalCurEstado=opt;refreshModalBtns(opts);});
    eo.appendChild(btn);
  });
  const ss=SS[modalCurEstado]||SS['Activa'];
  const pc=document.getElementById('prev-chip');
  pc.style.cssText=`background:${ss.bg};border-color:${ss.bc};`;
  pc.innerHTML=`<span class="dot" style="background:${ss.bc}"></span><span style="color:${ss.tc}">${modalCurEstado}</span>`;
}

function openModal(r){
  modalRec=r;modalCurEstado=getE(r);
  const o=getO(r),act=getAct(r)||{},grade=getG(r);
  const isFinde=r.finde,isSENA=r.tipo==='SENA';

  document.getElementById('m-title').textContent=
    r.colegio.includes('Kennedy')?`JFK · Grado ${grade}`:
    r.colegio.includes('Santa')?`SB · Grado ${grade}`:r.colegio;
  document.getElementById('m-sub').textContent=
    `${r.fecha.split('-').reverse().join('/')} · ${r.dia} · ${r.mes}${r.slotCount>1?` · Clase ${r.slotIndex} de ${r.slotCount}`:''}`;
  const hrDiv=document.getElementById('m-hr');
  if(r.horario&&r.horario!=='—'){hrDiv.textContent='🕐 '+r.horario;hrDiv.style.display='inline-block';}
  else hrDiv.style.display='none';

  const opts=isFinde?['No aplica','SEDE SENA','DESPLAZAMIENTO']:
    ['Activa','Impartida','Cancelada','Sin programación','Recuperada'];
  refreshModalBtns(opts);

  const obsSel=document.getElementById('m-obs-sel');
  obsSel.innerHTML=OBS.map(op=>`<option value="${op}">${op||'— Sin observación —'}</option>`).join('');
  obsSel.value=o;
  document.getElementById('m-obs-inp').value=o;

  const gradeSec=document.getElementById('grade-section');
  const gradeSel=document.getElementById('m-grado');
  if(r.tipo==='CLASE'){
    const gradeOptions=getGradeOptionsForRecord(r);
    gradeSel.innerHTML=gradeOptions.map(option=>`<option value="${option}">${option}</option>`).join('');
    gradeSel.value=gradeOptions.includes(grade)?grade:(gradeOptions[0]||grade);
    gradeSec.style.display='block';
  } else {
    gradeSel.innerHTML='';
    gradeSec.style.display='none';
  }

  // Actividad — solo para clases
  const actSec=document.getElementById('act-section');
  if(r.tipo==='CLASE'){
    actSec.style.display='block';
    document.getElementById('m-act-nombre').value=act.nombre||'';
    document.getElementById('m-act-fecha').value=act.fecha||'';
    updateActPreview();
  } else {
    actSec.style.display='none';
  }

  document.getElementById('modal-bg').classList.add('open');
}

function updateActPreview(){
  const nombre=document.getElementById('m-act-nombre').value;
  const fecha=document.getElementById('m-act-fecha').value;
  const prev=document.getElementById('act-preview');
  if(nombre||fecha){
    prev.innerHTML=`<span style="background:#D1FAE5;color:#065f46;padding:4px 10px;border-radius:8px;font-weight:700;">
      📋 ${nombre||'Sin nombre'} ${fecha?'· Entrega: '+fmtActFecha(fecha):'· Sin fecha'}</span>`;
  } else {
    prev.innerHTML='';
  }
}
document.getElementById('m-act-nombre').addEventListener('input',updateActPreview);
document.getElementById('m-act-fecha').addEventListener('change',updateActPreview);

function closeModal(){document.getElementById('modal-bg').classList.remove('open');modalRec=null;}
function saveModal(){
  if(!modalRec)return;
  const obs=document.getElementById('m-obs-inp').value.trim()||document.getElementById('m-obs-sel').value;
  const actNombre=document.getElementById('m-act-nombre').value.trim();
  const actFecha=document.getElementById('m-act-fecha').value;
  const act=(actNombre||actFecha)?{nombre:actNombre,fecha:actFecha}:null;
  estados[modalRec.id]={...(estados[modalRec.id]||{}),estado:modalCurEstado,obs,act};
  if(modalRec.tipo==='CLASE'){
    applyGradeToRecord(modalRec,document.getElementById('m-grado').value||getG(modalRec));
    estados[modalRec.id]={...(estados[modalRec.id]||{}),estado:modalCurEstado,obs,act};
  }
  saveData();closeModal();render();
}
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});

// ════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════
function render(){
  buildNav();
  if(curView==='dash')renderDash();
  else if(curView==='reg')renderReg();
  else if(curView==='all')renderAll();
  else renderCal();
}

configureDeploymentMode();
(async function bootstrapCalendar(){
  await loadData();
  render();
  if(window._firebaseDb&&typeof window._firebaseDb.checkAvailability==='function'){
    setInterval(()=>{
      if(!pendingCalendarSnapshot){
        loadFirebaseSnapshot(true).then((remoteSnapshot)=>{
          const localSnapshot=readLocalSnapshot();
          if(remoteSnapshot&&(!localSnapshot||snapshotTime(remoteSnapshot)>snapshotTime(localSnapshot))){
            applyCalendarSnapshot(remoteSnapshot);
            persistLocalSnapshot(remoteSnapshot);
            setSaveChip('☁ Cambios remotos cargados',false);
            render();
          }
        }).catch(()=>{});
      }
    },FIREBASE_REFRESH_MS);
  }
})();
</script>
